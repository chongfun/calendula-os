name: Release firmware images

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable, firmware target)
        run: |
          rustup toolchain install stable --profile minimal
          rustup target add riscv32imc-unknown-none-elf --toolchain stable

      - name: Install espflash
        run: CARGO_BUILD_TARGET=x86_64-unknown-linux-gnu cargo install espflash --locked

      - name: Build X4 release images
        run: tools/build-release.sh x4

      - name: Build X3 release images
        run: tools/build-release.sh x3

      - name: Assemble public release assets
        run: |
          mkdir -p target/public-release
          cp target/release-images/firmware.bin target/public-release/firmware-x4.bin
          cp target/release-images/firmware-x3.bin target/public-release/firmware-x3.bin
          cp target/release-images/update.bin target/public-release/update.bin
          cp target/release-images/FWUPDX3.BIN target/public-release/FWUPDX3.BIN

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            target/public-release/firmware-x4.bin \
            target/public-release/firmware-x3.bin \
            target/public-release/update.bin \
            target/public-release/FWUPDX3.BIN \
            --title "${GITHUB_REF_NAME}" \
            --notes "MarigoldOS ${GITHUB_REF_NAME} firmware images for Xteink X4 and X3."
