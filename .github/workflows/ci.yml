name: CI

on:
  pull_request:
  push:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  # Host target for crates that build/test on a plain host (see README's
  # "Development" section). The firmware target (fw, hal-ext) comes from
  # .cargo/config.toml's [build] default and rust-toolchain.toml.
  HOST_TARGET: x86_64-unknown-linux-gnu

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - name: Install Rust (stable, rustfmt)
        run: rustup toolchain install stable --profile minimal --component rustfmt
      - name: Check fmt
        run: tools/check.sh fmt

  clippy-firmware:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - name: Install Rust (stable, firmware target, clippy)
        run: |
          rustup toolchain install stable --profile minimal --component clippy
          rustup target add riscv32imc-unknown-none-elf --toolchain stable
      - name: Check firmware clippy
        run: tools/check.sh clippy-firmware

  clippy-host:
    name: Lint Host Code
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - name: Install Rust (stable, clippy)
        run: rustup toolchain install stable --profile minimal --component clippy
      - name: Check host clippy
        run: tools/check.sh clippy-host

  test:
    name: Test Host Code
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - name: Install Rust (stable)
        run: rustup toolchain install stable --profile minimal
      - name: Test host
        run: tools/check.sh test-host

  golden-frames:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - name: Install Rust (stable)
        run: rustup toolchain install stable --profile minimal
      - name: Check golden frames
        run: tools/check.sh golden-frames
      # tools/emulator is its own cargo workspace, so the root `cargo test
      # --workspace` never reaches it; without these the reading-page goldens
      # and the emulator unit tests run in no workflow at all.
      - name: Test emulator (reading goldens, unit tests)
        run: tools/check.sh test-emulator

  build-firmware:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - name: Install Rust (stable, firmware target)
        run: |
          rustup toolchain install stable --profile minimal
          rustup target add riscv32imc-unknown-none-elf --toolchain stable
      - name: Build firmware (release)
        run: tools/check.sh build-firmware
