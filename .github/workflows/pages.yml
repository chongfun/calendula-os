name: Deploy web emulator to Pages

on:
  push:
    branches: [main]
    paths:
      - "web/**"
      - "tools/web-emulator/**"
      - "tools/build-web.sh"
      - "app-core/**"
      - "display/**"
      - "ui/**"
      - "proto/**"
      - "fixtures/scenarios/**"
      - "fixtures/golden/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust (pinned nightly, wasm target)
        run: |
          rustup toolchain install nightly-2025-10-01 --profile minimal
          rustup target add wasm32-unknown-unknown --toolchain nightly-2025-10-01
      - name: Build wasm emulators (all boards) and assemble site
        run: ./tools/build-web.sh _site
      - name: Test both panel models and scenario contracts
        run: |
          cargo +nightly-2025-10-01 test --manifest-path tools/emulator/Cargo.toml --target x86_64-unknown-linux-gnu --no-default-features
          cargo +nightly-2025-10-01 test --manifest-path tools/emulator/Cargo.toml --target x86_64-unknown-linux-gnu --no-default-features --features device-x3
      - name: Check emulator golden frames
        run: cargo +nightly-2025-10-01 run --manifest-path tools/emulator/Cargo.toml --target x86_64-unknown-linux-gnu --no-default-features -- --scenario fixtures/scenarios --check fixtures/golden
      - name: Generate presented screen gallery frames
        run: cargo +nightly-2025-10-01 run --manifest-path tools/emulator/Cargo.toml --target x86_64-unknown-linux-gnu --no-default-features -- --scenario fixtures/scenarios --present-dump _site/images/screens
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
