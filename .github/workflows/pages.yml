name: Deploy web emulator to Pages

on:
  push:
    branches: [main]
    paths:
      - "web/**"
      - "tools/verify_web_flasher.sh"
      - "tools/web-emulator/**"
      - "tools/build-web.sh"
      - "app-core/**"
      - "display/**"
      - "ui/**"
      - "proto/**"
      - "fixtures/scenarios/**"
      - "fixtures/golden/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag whose firmware should be published"
        required: false
        type: string

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ inputs.release_tag || github.sha }}
          persist-credentials: false
      - name: Install Rust (stable, wasm target)
        run: |
          rustup toolchain install stable --profile minimal
          rustup target add wasm32-unknown-unknown --toolchain stable
      - name: Install binaryen (wasm-opt)
        run: sudo apt-get update && sudo apt-get install -y binaryen
      - name: Build wasm emulators (all boards) and assemble site
        run: ./tools/build-web.sh _site
      - name: Download release firmware
        env:
          RELEASE_TAG: ${{ inputs.release_tag || 'latest' }}
        run: |
          if [ "$RELEASE_TAG" = latest ]; then
            gh release download --repo "$GITHUB_REPOSITORY" \
              --pattern firmware-x4.bin --pattern firmware-x3.bin \
              --pattern update.bin --pattern FWUPDX3.BIN --dir _site
          else
            gh release download "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" \
              --pattern firmware-x4.bin --pattern firmware-x3.bin \
              --pattern update.bin --pattern FWUPDX3.BIN --dir _site
          fi
          tools/verify_web_flasher.sh _site
      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5
