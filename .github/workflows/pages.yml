name: Deploy web emulator to Pages

on:
  push:
    branches: [main]
    paths:
      - "web/**"
      - "tools/web-emulator/**"
      - "app-core/**"
      - "display/**"
      - "ui/**"
      - "proto/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust (pinned nightly, wasm target)
        run: |
          rustup toolchain install nightly-2025-10-01 --profile minimal
          rustup target add wasm32-unknown-unknown --toolchain nightly-2025-10-01
      - name: Build wasm emulators (all boards) and assemble site
        run: ./tools/build-web.sh _site
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
