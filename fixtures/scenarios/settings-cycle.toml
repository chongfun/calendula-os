# Walk every visible Settings row with the change key: typeface, type size,
# type weight, line spacing, refresh policy, orientation, and front buttons
# each advance one step, then Back returns home. The buttons named below are
# physical: the orientation row takes two changes to leave the boot portrait
# and reach buttons-top, which rotates the mapping, and after the
# front-buttons confirm the two front pairs also swap, so the closing presses
# land on the rotated-and-swapped keys.

[[steps]]
button = "Next"

[[steps]]
button = "Confirm"

[[steps]]
button = "Next"

[[steps]]
button = "Confirm"

[[steps]]
button = "Next"

[[steps]]
button = "Confirm"

[[steps]]
button = "Next"

[[steps]]
button = "Confirm"

[[steps]]
button = "Next"

[[steps]]
button = "Confirm"

[[steps]]
button = "Next"

# Portrait -> buttons-below landscape. Both holds map keys directly, so this
# press is still plain Confirm.
[[steps]]
button = "Confirm"

# Buttons-below -> buttons-top, the hold that rotates the mapping.
[[steps]]
button = "Confirm"

# Rotated: physical Back now reads as the browse-forward key.
[[steps]]
button = "Back"

# Rotated: physical Previous carries the change action; the front pairs swap.
[[steps]]
button = "Previous"

# Rotated and swapped: physical Confirm now carries Back, exiting home.
[[steps]]
button = "Confirm"

[expect]
view = "Home"
selection = 0
font_family = "Merriweather"
font_size = "Large"
font_weight = "Heavy"
line_spacing = "Relaxed"
refresh_policy = "FullEveryTen"
orientation = "landscape-top"
front_buttons = "pages-left"
last_refresh = "FastClean"
