# Walk the whole wireless session: Previous opens Wireless from Home,
# Confirm connects, and scripted wifi-task events advance the screen
# through connecting and connected to the serving book shelf.

[[steps]]
button = "Previous"

[[steps]]
button = "Confirm"

[[steps]]
sync = "Connecting"

[[steps]]
sync = "Connected"
ip = [192, 168, 1, 23]

[[steps]]
sync = "Serving"
ip = [192, 168, 1, 23]

[expect]
view = "Wireless"
sync_status = "serving"
